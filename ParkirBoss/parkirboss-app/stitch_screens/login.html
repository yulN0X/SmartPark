<style>
    .brutal-border {
      border: 3px solid #1a1a1a;
    }
    .brutal-border-4 {
      border: 4px solid #1a1a1a;
    }
    .brutal-shadow {
      box-shadow: 4px 4px 0px 0px #1a1a1a;
    }
    .brutal-shadow-hover:hover {
      box-shadow: 6px 6px 0px 0px #1a1a1a;
      transform: translate(-2px, -2px);
    }
    .brutal-shadow-active:active {
      box-shadow: 0px 0px 0px 0px #1a1a1a;
      transform: translate(4px, 4px);
    }
    .brutal-input {
      border: none;
      border-bottom: 3px solid #1a1a1a;
      border-radius: 0;
    }
    .brutal-input:focus {
      outline: none;
      border-bottom-color: #765b00; /* tertiary */
      box-shadow: none;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col justify-center items-center px-margin py-xl relative">
<!-- Main Card -->
<main class="w-full max-w-md bg-surface-container-lowest brutal-border brutal-shadow p-lg flex flex-col gap-xl">
<!-- Header -->
<header class="flex items-center gap-sm">
<div class="bg-primary-container text-on-primary-container p-sm brutal-border brutal-shadow flex justify-center items-center">
<span class="material-symbols-outlined text-[32px]">local_parking</span>
</div>
<h1 class="font-headline-lg text-headline-lg uppercase font-black tracking-tighter text-on-surface">PARKIR BOSS</h1>
</header>
<!-- Title & Subtitle -->
<div class="flex flex-col gap-xs">
<h2 class="font-headline-xl text-headline-xl text-on-surface">
        Welcome <br/> <span class="text-tertiary">Back</span>
</h2>
<p class="font-body-md text-body-md text-on-surface-variant font-medium">Enter your details to access your account.</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-lg">
<!-- Email Field -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-md text-label-md text-on-surface uppercase" for="email">Email Address</label>
<div class="flex items-center relative">
<span class="material-symbols-outlined absolute left-0 bottom-3 text-on-surface-variant">mail</span>
<input class="w-full bg-transparent brutal-input py-2 pl-[36px] font-body-md text-body-md text-on-surface placeholder-on-surface-variant" id="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs relative">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface uppercase" for="password">Password</label>
<a class="font-label-sm text-label-sm text-tertiary hover:underline uppercase" href="#">Forgot Password?</a>
</div>
<div class="flex items-center relative">
<span class="material-symbols-outlined absolute left-0 bottom-3 text-on-surface-variant">lock</span>
<input class="w-full bg-transparent brutal-input py-2 pl-[36px] pr-[36px] font-body-md text-body-md text-on-surface placeholder-on-surface-variant" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-0 bottom-3 text-on-surface-variant hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-tertiary text-on-tertiary brutal-border-4 brutal-shadow brutal-shadow-hover brutal-shadow-active py-md flex justify-center items-center gap-sm mt-sm transition-all" type="submit">
<span class="font-label-lg text-label-lg uppercase font-bold">Log In</span>
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t-[3px] border-on-surface"></div>
<span class="flex-shrink-0 px-md font-label-sm text-label-sm uppercase text-on-surface-variant bg-surface-container-lowest">Or Continue With</span>
<div class="flex-grow border-t-[3px] border-on-surface"></div>
</div>
<!-- Social Login -->
<div class="flex gap-md">
<button class="flex-1 bg-surface-container text-on-surface brutal-border brutal-shadow brutal-shadow-hover brutal-shadow-active py-3 flex justify-center items-center gap-xs transition-all" type="button">
<span class="font-label-md text-label-md uppercase font-bold">Google</span>
</button>
<button class="flex-1 bg-surface-container text-on-surface brutal-border brutal-shadow brutal-shadow-hover brutal-shadow-active py-3 flex justify-center items-center gap-xs transition-all" type="button">
<span class="font-label-md text-label-md uppercase font-bold">Apple</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center mt-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant">
        Don't have an account? 
        <a class="font-label-md text-label-md text-tertiary hover:underline uppercase ml-1" href="#">Create Account</a>
</p>
</div>
</main>
