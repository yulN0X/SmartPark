<div class="max-w-md mx-auto min-h-screen flex flex-col border-x-4 border-on-background relative bg-surface-container-low">
<!-- Transactional Header -->
<header class="flex items-center justify-between p-margin border-b-4 border-on-background bg-surface z-10 sticky top-0">
<button aria-label="Go back" class="w-12 h-12 border-4 border-on-background flex items-center justify-center bg-surface-container-high brutalist-shadow-sm brutalist-active-sm transition-all">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md uppercase text-center flex-1">Add Vehicle</h1>
<div class="w-12 h-12"></div> <!-- Visual balancer -->
</header>
<!-- Progress Bar -->

</div>

<main class="flex-1 p-margin flex flex-col gap-xl overflow-y-auto">
<!-- Vehicle Type Selection -->
<!-- License Plate Input -->
<section class="flex flex-col gap-sm relative">
<div class="flex justify-between items-end mb-xs">
<label class="font-label-lg text-label-lg uppercase bg-surface-container-high px-sm py-xs border-4 border-on-background translate-y-[4px] z-10 ml-sm" for="license_plate">License Plate</label>
</div>
<div class="relative bg-surface">
<input autocomplete="off" class="w-full h-32 text-center font-headline-xl text-headline-xl uppercase tracking-[0.15em] border-4 border-on-background bg-surface-container-lowest focus:bg-inverse-on-surface focus:border-primary-container placeholder-outline-variant brutalist-shadow transition-colors" id="license_plate" placeholder="ABC-1234" type="text"/>

<div class="absolute top-2 left-2 w-4 h-4 border-t-4 border-l-4 border-on-background pointer-events-none"></div>
<div class="absolute top-2 right-2 w-4 h-4 border-t-4 border-r-4 border-on-background pointer-events-none"></div>
<div class="absolute bottom-2 left-2 w-4 h-4 border-b-4 border-l-4 border-on-background pointer-events-none"></div>
<div class="absolute bottom-2 right-2 w-4 h-4 border-b-4 border-r-4 border-on-background pointer-events-none"></div>
</div>

<button class="flex items-center gap-sm px-lg py-sm border-4 border-on-background bg-tertiary-fixed text-on-tertiary-fixed brutalist-shadow brutalist-active transition-all group">
<span class="material-symbols-outlined text-[24px] group-active:scale-90 transition-transform">photo_camera</span>
<span class="font-label-md text-label-md uppercase">Scan Plate</span>
</button>
</div>
</section>
<!-- Supplemental Info / Helper -->
<section class="mt-auto p-md border-4 border-on-background bg-surface-variant flex gap-md items-start">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant leading-tight">
                    Ensure your license plate matches your official registration documents exactly to avoid parking validation errors.
                </p>
</section>
</main>
<!-- Sticky Bottom Action (Not a Nav Bar, but a contextual action) -->
<div class="p-margin border-t-4 border-on-background bg-surface z-10">
<button class="w-full h-16 flex items-center justify-center gap-sm bg-primary-container text-on-primary-container font-headline-md text-headline-md uppercase border-4 border-on-background brutalist-shadow brutalist-active transition-all">
